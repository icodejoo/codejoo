packages:
  - apps/*
  - packages/*
  - tools/*

catalog:
  "@types/node": ^24
  "@typescript/native-preview": beta
  '@vitest/browser': 4.1.5
  '@vitest/browser-playwright': 4.1.5
  playwright: ^1.60.0
  terser: ^5.47.1
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@0.1.22
  vite-plus: 0.1.22
  vitest: npm:@voidzero-dev/vite-plus-test@0.1.22

catalogMode: prefer
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
