<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>@codejoo/stomp 浏览器演示</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 760px; margin: 2rem auto; padding: 0 1rem; color: #222; }
  h1 { font-size: 1.2rem; }
  .row { display: flex; gap: 0.5rem; margin: 0.5rem 0; }
  .row input[type="text"] { flex: 1; padding: 0.4rem; font-family: monospace; }
  .row button { padding: 0.4rem 0.8rem; cursor: pointer; }
  #state { font-weight: bold; }
  #state.connected { color: #1a7f37; }
  #state.disconnected, #state.idle { color: #b42318; }
  #state.connecting, #state.reconnecting { color: #b98900; }
  #log { border: 1px solid #ccc; border-radius: 4px; height: 320px; overflow-y: auto; padding: 0.5rem; background: #fafafa; font-family: monospace; font-size: 0.85rem; white-space: pre-wrap; }
  #log .in { color: #0550ae; }
  #log .out { color: #6e40c9; }
  #log .sys { color: #666; font-style: italic; }
  small { color: #666; }
</style>
</head>
<body>
  <h1>@codejoo/stomp 浏览器演示 —— 对接 <a href="https://github.com/icodejoo/api-ws-demo" target="_blank">api-ws-demo</a></h1>
  <p><small>不依赖任何本地 dev server/构建步骤——直接双击这个 HTML 文件在浏览器打开即可运行
  （库通过 CDN 以 ES module 方式加载；需要联网）。</small></p>

  <div class="row">
    <label for="url">服务器地址：</label>
    <input id="url" type="text" value="wss://api-ws-demo-latest.onrender.com/stomp" />
  </div>
  <div class="row">
    <span>连接状态：</span>
    <span id="state">idle</span>
    <button id="connectBtn">连接</button>
    <button id="disconnectBtn" disabled>断开</button>
  </div>

  <div class="row">
    <label for="topic">订阅 topic：</label>
    <input id="topic" type="text" value="/topic/public/browser-demo" />
    <button id="subscribeBtn" disabled>订阅</button>
  </div>

  <div id="log"></div>

  <div class="row">
    <input id="messageInput" type="text" placeholder="输入要发送的消息..." aria-label="要发送的消息" disabled />
    <button id="sendBtn" disabled>发送</button>
  </div>
  <p><small>发到普通 topic 会被服务端包成 <code>{"response": &lt;发送内容&gt;}</code> 广播；订阅成功
  3 秒后服务端也一定会主动推一条（历史为空则是 <code>{"response":"ready"}</code>）。</small></p>

  <script type="module">
    import { Stompsocket } from "https://esm.sh/@codejoo/stomp@0.2.0";

    const $ = (id) => document.getElementById(id);
    const logEl = $("log");
    const stateEl = $("state");

    function log(text, cls) {
      const line = document.createElement("div");
      if (cls) line.className = cls;
      const ts = new Date().toLocaleTimeString();
      line.textContent = `[${ts}] ${text}`;
      logEl.appendChild(line);
      logEl.scrollTop = logEl.scrollHeight;
    }

    let client = null;
    let currentTopic = null;
    let sub = null;

    function setConnectedUi(connected) {
      $("connectBtn").disabled = connected;
      $("disconnectBtn").disabled = !connected;
      $("subscribeBtn").disabled = !connected;
      $("url").disabled = connected;
      if (!connected) {
        $("messageInput").disabled = true;
        $("sendBtn").disabled = true;
      }
    }

    $("connectBtn").addEventListener("click", () => {
      const brokerURL = $("url").value.trim();
      if (!brokerURL) return;

      client = new Stompsocket({
        brokerURL,
        debug: false,
        onStateChanged: (s) => {
          stateEl.textContent = s;
          stateEl.className = s;
        },
        onConnected: () => log("已连接到服务器", "sys"),
        onDisconnected: () => log("已断开连接", "sys"),
        onStompError: (frame) => log(`服务端 ERROR: ${frame.headers.message ?? ""}`, "sys"),
        onWebSocketError: () => log("WebSocket 连接错误", "sys"),
      });
      client.activate();
      setConnectedUi(true);
    });

    $("disconnectBtn").addEventListener("click", async () => {
      if (!client) return;
      await client.dispose();
      client = null;
      currentTopic = null;
      sub = null;
      setConnectedUi(false);
    });

    $("subscribeBtn").addEventListener("click", () => {
      if (!client) return;
      const topic = $("topic").value.trim();
      if (!topic) return;

      if (sub) sub.unsubscribe();
      currentTopic = topic;
      sub = client.subscribe(topic, (json) => {
        log(`收到 [${topic}]: ${JSON.stringify(json)}`, "in");
      });
      log(`已订阅 ${topic}`, "sys");
      $("messageInput").disabled = false;
      $("sendBtn").disabled = false;
    });

    function sendMessage() {
      if (!client || !currentTopic) return;
      const text = $("messageInput").value;
      if (!text) return;
      client.send(currentTopic, { body: text });
      log(`发送 [${currentTopic}]: ${text}`, "out");
      $("messageInput").value = "";
    }

    $("sendBtn").addEventListener("click", sendMessage);
    $("messageInput").addEventListener("keydown", (e) => {
      if (e.key === "Enter") sendMessage();
    });
  </script>
</body>
</html>
