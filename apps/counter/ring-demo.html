    <h1>createRingRender — 圆形数码倒计时</h1>
    <p class="sub">外圈 60 刻度 = 当前分钟剩余秒，每秒灭一格；最后一分钟按秒变 绿 → 黄 → 红。</p>

    <div class="stage" id="stage"></div>

    <div class="panel">
      <div class="row">
        <span class="lbl">时长</span>
        <input type="number" id="dur" value="65" /> 秒
        <span class="hint">（设 65 秒可看到「跨分钟 → 最后一分钟变色」）</span>
      </div>
      <div class="row">
        <span class="lbl">格式</span>
        <select id="fmt">
          <option value="mm:ss" selected>mm:ss</option>
          <option value="ss">ss</option>
          <option value="HH:mm:ss">HH:mm:ss</option>
        </select>
        <span class="lbl">redAt</span><input type="number" id="redAt" value="3" /> <span class="lbl" style="min-width: 48px">yellowAt</span><input type="number" id="yellowAt" value="10" />
      </div>
      <div class="row">
        <span class="lbl">开关</span>
        <label class="ck"><input type="checkbox" id="digits" checked /> 数码区</label>
        <label class="ck"><input type="checkbox" id="arc" checked /> 装饰弧</label>
        <label class="ck"><input type="checkbox" id="glow" checked /> 发光</label>
        <label class="ck"><input type="checkbox" id="clockwise" checked /> 顺时针</label>
      </div>
      <div class="row">
        <span class="lbl">数码区</span>
        <select id="digitMode">
          <option value="segment" selected>七段 segment</option>
          <option value="text">文字 text</option>
        </select>
        <label class="ck"><input type="checkbox" id="rainbowMin" /> 彩虹分钟（inner.colorAt）</label>
      </div>
      <div class="row" style="justify-content: center; margin-top: 4px">
        <button id="start">▶ 开始 / 重新开始</button>
        <button id="stop">■ 停止</button>
      </div>
      <p class="hint" style="margin: 0">提示：把时长设成 8 秒可快速看完整个 绿→黄→红 收尾。完整 API 测试台见 <a href="/">/</a>。</p>
    </div>

    <script type="module">
      import { use } from "./src/core/index.ts";
      import countdown, { register, clear } from "./src/count-down/count-down.ts";
      import { createRingRender } from "./src/plugins/ring.ts";

      use(register());

      const stage = document.getElementById("stage");
      const num = (id) => Number(document.getElementById(id).value);
      const str = (id) => document.getElementById(id).value;
      const chk = (id) => document.getElementById(id).checked;
      const LABEL = "ring-demo";

      const qp = new URLSearchParams(location.search);
      // 一组柔和的逐分钟色（彩虹分钟演示 inner.colorAt）
      const MIN_HUES = ["#ff6a5a", "#ffa23a", "#ffcf3a", "#37d67a", "#3ac8ff", "#7a7aff", "#c86bff"];
      function ringOpts() {
        const showArc = chk("arc");
        const rainbow = qp.has("rainbow") ? qp.get("rainbow") !== "0" : chk("rainbowMin");
        const mode = qp.get("digitmode") || str("digitMode"); // 截图自检用
        return {
          redAt: num("redAt"),
          yellowAt: num("yellowAt"),
          glow: chk("glow"),
          clockwise: qp.has("cw") ? qp.get("cw") !== "0" : chk("clockwise"), // ?cw=0 强制逆时针（截图自检用）
          digit: chk("digits") ? { mode } : false,
          arcA: showArc ? {} : false,
          arcB: showArc ? {} : false,
          inner: rainbow ? { colorAt: ({ index }) => MIN_HUES[index % MIN_HUES.length] } : {},
        };
      }

      function startRing() {
        clear(LABEL); // 停掉上一轮，重置容器
        countdown(num("dur") * 1000, stage, {
          fmt: str("fmt"),
          render: createRingRender(ringOpts()),
          label: LABEL,
          lazy: false,
          showDays: false,
          onDone: () => console.log("[ring-demo] done"),
        });
      }

      document.getElementById("start").onclick = startRing;
      document.getElementById("stop").onclick = () => clear(LABEL);

      // 截图自检用：?static=N（剩余 N 秒）确定性单帧；可选 ?total=T 指定初始总秒数（看排空中间态）
      const staticSec = qp.get("static");
      if (staticSec != null) {
        const remaining = Number(staticSec) * 1000;
        const total = (qp.has("total") ? Number(qp.get("total")) : Number(staticSec)) * 1000;
        const pad = (n) => String(n).padStart(2, "0");
        const mmss = (ms) => `${pad(Math.floor(ms / 60000))}:${pad(Math.floor((ms % 60000) / 1000))}`;
        const value = [0, 0, 0, 0, 0];
        const ctxAt = (ms) => ({ el: stage, id: 0, deadline: 0, remaining: ms, value, active: true, paused: false, fmt: mmss, parser: () => value });
        // 生命周期 API：mount 以 total 作为总时长锚点，再 update 到目标剩余
        const r = createRingRender(ringOpts());
        const state = r.mount(stage, ctxAt(total));
        if (remaining < total) r.update(state, remaining, value, ctxAt(remaining));
      } else {
        startRing(); // 进页面就跑一轮
      }
    </script>
  </body>
