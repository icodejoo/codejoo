<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>@codejoo/timer — Demo</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 24px;
        color: #222;
      }
      h1 {
        font-size: 20px;
      }
      h2 {
        font-size: 16px;
        margin-top: 28px;
      }
      .row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        align-items: center;
        margin: 8px 0;
      }
      button {
        padding: 6px 12px;
        border: 1px solid #ccc;
        background: #fff;
        border-radius: 4px;
        cursor: pointer;
        font-size: 13px;
      }
      button:hover {
        background: #f0f0f0;
      }
      .num {
        display: inline-block;
        min-width: 160px;
        padding: 4px 10px;
        background: #111;
        color: #0f6;
        font-family: ui-monospace, monospace;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <h1>@codejoo/timer — Live Demo</h1>

    <h2>1. countUp / countDown</h2>
    <div class="row">
      <span>countUp:</span><span class="num" id="cu">₱0.00</span>
      <button id="cuStart">start</button>
      <button id="cuUpdate">update→999999</button>
    </div>
    <div class="row">
      <span>countDown:</span><span class="num" id="cd">00:01:00</span>
      <button id="cdStart">start (60s)</button>
    </div>

    <h2>2. setTimeout / setInterval / pause / resume</h2>
    <div class="row">
      <button id="setInt">setInterval(1s)</button>
      <button id="pause">pause</button>
      <button id="resume">resume</button>
      <button id="stop">stop</button>
      <span id="intLog" class="num">0</span>
    </div>

    <script type="module" src="/src/demo.ts"></script>
  </body>
</html>
